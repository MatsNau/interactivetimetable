name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Tests
        run: dotnet test InteractiveTimetable.slnx --nologo

      # Eine selbstständige Exe ohne .NET-Installationsvoraussetzung auf dem Zielrechner.
      - name: Publish (win-x64, Einzeldatei)
        run: >
          dotnet publish src/Timetable.App/Timetable.App.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -o publish

      # Bei jedem Lauf als Artefakt herunterladbar (Actions-Seite des Runs).
      - name: Exe als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: InteractiveTimetable-win-x64
          path: publish/*.exe
          if-no-files-found: error

      # Bei einem Versions-Tag (v1.0 etc.) zusätzlich ein GitHub-Release mit der Exe.
      - name: Release anlegen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*.exe
